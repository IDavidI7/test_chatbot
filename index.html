<!DOCTYPE html>
<html>
<head>
<title>Chat IA</title>
<style>
body{
font-family: Arial;
}

#chat{
width:400px;
height:400px;
border:1px solid #ccc;
overflow:auto;
padding:10px;
}

#input{
width:300px;
}
</style>
</head>

<body>

<h2>Chat com IA</h2>

<div id="chat"></div>

<input id="input" placeholder="Digite sua pergunta">
<button onclick="sendMessage()">Enviar</button>

<script>

async function sendMessage(){

let input = document.getElementById("input")
let message = input.value

document.getElementById("chat").innerHTML +=
"<p><b>Você:</b> "+message+"</p>"

let response = await fetch("https://dvdewd.app.n8n.cloud/webhook-test/chat-ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
})

let data = await response.json()

document.getElementById("chat").innerHTML +=
"<p><b>IA:</b> "+data.reply+"</p>"

input.value=""

}

</script>

</body>
</html>
